name: skill-audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pre-publish smoke test for the W007/W021-class issues the skills.sh
      # (Vercel) security audit flags. Pure stdlib — no dependencies.
      - run: python3 scripts/skill_audit.py
